<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>摄像头全屏 · 前后摄</title>
    <style>
        /* === 全局重置 & 基础 === */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
            /* 防止双击缩放 */;
        }

        /* === 主容器 === */
        .app {
            width: 100%;
            max-width: 1000px;
            padding: 12px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* === 视频包装器 === */
        .video-wrapper {
            position: relative;
            background: #14141c;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05);
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.3s ease;
            flex-shrink: 0;
        }

        .video-wrapper.active {
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 0 0 0 2px rgba(99, 140, 255, 0.25);
        }

        /* === 视频元素 === */
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #0d0d14;
            /* 默认镜像，由 JS 控制，后摄不镜像，前摄镜像 */
            transform: scaleX(-1);
        }

        /* === 占位 / 启动界面 === */
        .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 5;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            padding: 30px;
            text-align: center;
            border-radius: 28px;
        }

        .placeholder.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .placeholder .icon {
            width: 80px;
            height: 80px;
            background: rgba(99, 140, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            transition: transform 0.3s ease;
        }

        .placeholder .icon svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: #6b8cff;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .placeholder h2 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 60%, #a0b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .placeholder p {
            color: rgba(255, 255, 255, 0.55);
            font-size: 16px;
            max-width: 340px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* === 按钮 === */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4f7aff, #6c3cff);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease, opacity 0.3s ease;
            box-shadow: 0 8px 30px rgba(79, 122, 255, 0.3);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 60%);
            pointer-events: none;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 12px 40px rgba(79, 122, 255, 0.45);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn.loading .spinner {
            display: inline-block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* === 控制栏 (底部) === */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 20px;
            flex-wrap: wrap;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s;
            padding: 0 4px;
        }

        .controls.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .controls .btn-ctrl {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            letter-spacing: 0.2px;
            touch-action: manipulation;
            flex: 0 1 auto;
            min-width: 64px;
        }

        .controls .btn-ctrl:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-2px);
        }

        .controls .btn-ctrl:active {
            transform: scale(0.94);
        }

        .controls .btn-ctrl svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .controls .btn-ctrl .label {
            font-size: 13px;
            font-weight: 500;
        }

        /* 各按钮主题 */
        .controls .btn-ctrl.fullscreen {
            background: rgba(79, 122, 255, 0.2);
            border-color: rgba(79, 122, 255, 0.3);
            color: #8aacff;
        }
        .controls .btn-ctrl.fullscreen:hover {
            background: rgba(79, 122, 255, 0.3);
        }

        .controls .btn-ctrl.switch-cam {
            background: rgba(0, 200, 150, 0.15);
            border-color: rgba(0, 200, 150, 0.2);
            color: #6fdfc0;
        }
        .controls .btn-ctrl.switch-cam:hover {
            background: rgba(0, 200, 150, 0.25);
        }

        .controls .btn-ctrl.danger {
            color: #ff6b7a;
            border-color: rgba(255, 107, 122, 0.15);
        }
        .controls .btn-ctrl.danger:hover {
            background: rgba(255, 107, 122, 0.12);
        }

        /* === 状态指示 === */
        .status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 18px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .status.visible {
            opacity: 1;
        }

        .status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            animation: pulse-dot 1.8s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.75);
            }
        }

        /* === 错误提示 === */
        .error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 50, 50, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 80, 80, 0.2);
            padding: 20px 32px;
            border-radius: 20px;
            color: #ff7a8a;
            font-size: 15px;
            text-align: center;
            max-width: 340px;
            z-index: 10;
            display: none;
            line-height: 1.6;
            pointer-events: none;
        }

        .error-msg.show {
            display: block;
            animation: fadeSlideIn 0.4s ease;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* === 全屏样式适配 (手机 + 桌面) === */
        .video-wrapper:-webkit-full-screen {
            border-radius: 0 !important;
            aspect-ratio: auto !important;
            width: 100vw !important;
            height: 100vh !important;
        }
        .video-wrapper:fullscreen {
            border-radius: 0 !important;
            aspect-ratio: auto !important;
            width: 100vw !important;
            height: 100vh !important;
        }
        .video-wrapper:-webkit-full-screen #video {
            object-fit: contain;
        }
        .video-wrapper:fullscreen #video {
            object-fit: contain;
        }
        .video-wrapper:-webkit-full-screen .controls,
        .video-wrapper:fullscreen .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 0;
            z-index: 20;
            width: auto;
            max-width: 92vw;
        }
        .video-wrapper:-webkit-full-screen .status,
        .video-wrapper:fullscreen .status {
            bottom: 100px;
        }
        .video-wrapper:-webkit-full-screen .placeholder,
        .video-wrapper:fullscreen .placeholder {
            border-radius: 0 !important;
        }

        /* === 响应式 (手机优先) === */
        @media (max-width: 640px) {
            .app {
                padding: 8px;
                justify-content: center;
            }
            .video-wrapper {
                border-radius: 20px;
                aspect-ratio: 16 / 10;
            }
            .placeholder h2 {
                font-size: 22px;
            }
            .placeholder p {
                font-size: 14px;
                max-width: 280px;
                margin-bottom: 24px;
            }
            .btn {
                padding: 12px 28px;
                font-size: 15px;
            }
            .controls {
                gap: 10px;
                margin-top: 16px;
            }
            .controls .btn-ctrl {
                padding: 10px 14px;
                font-size: 13px;
                min-width: 56px;
                flex: 0 1 auto;
            }
            .controls .btn-ctrl .label {
                font-size: 12px;
            }
            .controls .btn-ctrl svg {
                width: 20px;
                height: 20px;
            }
            /* 在小屏上隐藏部分文字，只显示图标 */
            .controls .btn-ctrl .label {
                display: none;
            }
            .controls .btn-ctrl.fullscreen .label {
                display: inline;
                /* 全屏保留文字 */;
            }
            .status {
                font-size: 12px;
                padding: 4px 14px;
                bottom: 14px;
            }
        }

        @media (max-width: 400px) {
            .placeholder .icon {
                width: 64px;
                height: 64px;
            }
            .placeholder .icon svg {
                width: 34px;
                height: 34px;
            }
            .placeholder h2 {
                font-size: 19px;
            }
            .controls .btn-ctrl {
                padding: 8px 12px;
                min-width: 48px;
            }
            .controls .btn-ctrl svg {
                width: 18px;
                height: 18px;
            }
        }

        /* 当屏幕宽度大于640px时，显示完整标签 */
        @media (min-width: 641px) {
            .controls .btn-ctrl .label {
                display: inline !important;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <div class="video-wrapper" id="videoWrapper">

            <!-- 视频元素 -->
            <video id="video" autoplay playsinline></video>

            <!-- 占位启动界面 -->
            <div class="placeholder" id="placeholder">
                <div class="icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M23 7l-7 5 7 5V7z" />
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                    </svg>
                </div>
                <h2>打开摄像头</h2>
                <p>点击下方按钮，授权后即可看到实时画面<br />支持切换前后摄像头</p>
                <button class="btn" id="startBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">📷 启动摄像头</span>
                </button>
            </div>

            <!-- 错误提示 -->
            <div class="error-msg" id="errorMsg"></div>

            <!-- 状态 -->
            <div class="status" id="status">
                <span class="dot"></span>
                <span>直播中</span>
            </div>
        </div>

        <!-- 控制栏 -->
        <div class="controls" id="controls">
            <button class="btn-ctrl switch-cam" id="switchCamBtn" title="切换前后摄像头">
                <svg viewBox="0 0 24 24">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                    <polyline points="12 9 15 12 12 15" />
                    <line x1="9" y1="12" x2="15" y2="12" />
                </svg>
                <span class="label">翻转</span>
            </button>

            <button class="btn-ctrl fullscreen" id="fullscreenBtn">
                <svg viewBox="0 0 24 24">
                    <polyline points="15 3 21 3 21 9" />
                    <polyline points="9 21 3 21 3 15" />
                    <line x1="21" y1="3" x2="14" y2="10" />
                    <line x1="3" y1="21" x2="10" y2="14" />
                </svg>
                <span class="label">全屏</span>
            </button>

            <button class="btn-ctrl danger" id="stopBtn">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="8" y1="8" x2="16" y2="16" />
                    <line x1="16" y1="8" x2="8" y2="16" />
                </svg>
                <span class="label">关闭</span>
            </button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // === DOM 引用 ===
            const video = document.getElementById('video');
            const wrapper = document.getElementById('videoWrapper');
            const placeholder = document.getElementById('placeholder');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const switchCamBtn = document.getElementById('switchCamBtn');
            const controls = document.getElementById('controls');
            const status = document.getElementById('status');
            const errorMsg = document.getElementById('errorMsg');

            let stream = null;
            let isStreaming = false;
            let currentFacingMode = 'user'; // 'user' 或 'environment'
            let isFront = true; // 是否前摄

            // === 工具函数 ===
            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.add('show');
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 5000);
            }

            function setLoading(loading) {
                if (loading) {
                    startBtn.classList.add('loading');
                    startBtn.disabled = true;
                } else {
                    startBtn.classList.remove('loading');
                    startBtn.disabled = false;
                }
            }

            // 更新镜像：前摄镜像，后摄不镜像 (更自然的体验)
            function updateMirror() {
                if (isFront) {
                    video.style.transform = 'scaleX(-1)';
                } else {
                    video.style.transform = 'scaleX(1)';
                }
            }

            // === 核心：启动摄像头 (可指定 facingMode) ===
            async function startCamera(facingMode = 'user') {
                if (isStreaming) {
                    // 如果已经在流，先停止再重新启动（切换摄像头时）
                    stopCameraTracks();
                }

                setLoading(true);
                errorMsg.classList.remove('show');

                try {
                    const constraints = {
                        video: {
                            facingMode: facingMode,
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                        },
                        audio: false
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    await video.play();

                    // 记录当前 facing
                    currentFacingMode = facingMode;
                    isFront = (facingMode === 'user');
                    updateMirror();

                    isStreaming = true;
                    wrapper.classList.add('active');
                    placeholder.classList.add('hidden');
                    controls.classList.add('visible');
                    status.classList.add('visible');

                    setLoading(false);
                    startBtn.querySelector('.btn-text').textContent = '✅ 已启动';

                    // 启用切换按钮
                    switchCamBtn.disabled = false;

                } catch (err) {
                    console.error('摄像头启动失败:', err);
                    setLoading(false);
                    let msg = '无法访问摄像头';
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        msg = '🛑 摄像头权限被拒绝，请在浏览器设置中允许访问。';
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        msg = '📭 未检测到摄像头设备，请连接摄像头后重试。';
                    } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                        msg = '⚠️ 摄像头被其他应用占用，请关闭其他程序后重试。';
                    } else if (err.name === 'OverconstrainedError') {
                        msg = '📐 摄像头不支持当前分辨率设置，请重试。';
                    } else if (err.message && err.message.includes('Permission denied')) {
                        msg = '🛑 摄像头权限被拒绝，请在浏览器设置中允许访问。';
                    }
                    showError(msg);
                    // 重置状态
                    isStreaming = false;
                    wrapper.classList.remove('active');
                    placeholder.classList.remove('hidden');
                    controls.classList.remove('visible');
                    status.classList.remove('visible');
                    startBtn.querySelector('.btn-text').textContent = '📷 启动摄像头';
                    switchCamBtn.disabled = true;
                }
            }

            // 停止所有轨道 (不改变UI状态)
            function stopCameraTracks() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                video.srcObject = null;
                isStreaming = false;
            }

            // === 停止摄像头 (完整关闭) ===
            function stopCamera() {
                if (!isStreaming && !stream) return;
                stopCameraTracks();
                wrapper.classList.remove('active');
                placeholder.classList.remove('hidden');
                controls.classList.remove('visible');
                status.classList.remove('visible');
                startBtn.querySelector('.btn-text').textContent = '📷 启动摄像头';
                setLoading(false);
                switchCamBtn.disabled = true;

                if (document.fullscreenElement) {
                    document.exitFullscreen().catch(() => {});
                }
            }

            // === 切换前后摄像头 ===
            async function switchCamera() {
                if (!isStreaming) {
                    showError('请先启动摄像头');
                    return;
                }

                // 切换 facingMode
                const nextMode = (currentFacingMode === 'user') ? 'environment' : 'user';
                // 尝试用新模式启动 (内部会停止旧流)
                await startCamera(nextMode);
            }

            // === 全屏切换 ===
            function toggleFullscreen() {
                if (!isStreaming) {
                    showError('请先启动摄像头');
                    return;
                }

                if (!document.fullscreenElement) {
                    wrapper.requestFullscreen().catch(err => {
                        console.warn('全屏请求被拒绝:', err);
                        showError('无法进入全屏模式，请手动点击浏览器全屏按钮');
                    });
                } else {
                    document.exitFullscreen().catch(() => {});
                }
            }

            // === 全屏变化事件 ===
            function onFullscreenChange() {
                const isFull = !!document.fullscreenElement;
                const label = fullscreenBtn.querySelector('.label');
                if (isFull) {
                    label.textContent = '退出';
                    wrapper.style.cursor = 'none';
                } else {
                    label.textContent = '全屏';
                    wrapper.style.cursor = '';
                }
            }

            // === 键盘快捷键 ===
            function onKeydown(e) {
                if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    toggleFullscreen();
                }
                if (e.key === 'c' || e.key === 'C') {
                    e.preventDefault();
                    switchCamera();
                }
                if (e.key === 'Escape' && document.fullscreenElement) {
                    setTimeout(onFullscreenChange, 100);
                }
            }

            // === 事件绑定 ===
            startBtn.addEventListener('click', () => startCamera('user'));
            stopBtn.addEventListener('click', stopCamera);
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            switchCamBtn.addEventListener('click', switchCamera);

            // 全屏事件兼容
            document.addEventListener('fullscreenchange', onFullscreenChange);
            document.addEventListener('webkitfullscreenchange', onFullscreenChange);
            document.addEventListener('mozfullscreenchange', onFullscreenChange);
            document.addEventListener('MSFullscreenChange', onFullscreenChange);

            document.addEventListener('keydown', onKeydown);

            // 双击切换全屏
            video.addEventListener('dblclick', () => {
                if (isStreaming) toggleFullscreen();
            });

            // 页面关闭释放资源
            window.addEventListener('beforeunload', () => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                if (video.srcObject) {
                    video.srcObject = null;
                }
            });

            // 点击占位启动
            placeholder.addEventListener('click', (e) => {
                if (e.target.closest('.btn')) return;
                if (!isStreaming) startCamera('user');
            });

            // 提示
            console.log('📷 快捷键: F = 全屏, C = 切换摄像头');

            // 检测支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError('您的浏览器不支持摄像头访问，请使用最新版 Chrome / Firefox / Edge');
                startBtn.disabled = true;
                switchCamBtn.disabled = true;
            }

            // 初始禁用切换
            switchCamBtn.disabled = true;

        })();
    </script>

</body>
</html>
